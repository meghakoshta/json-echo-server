service: json-echo-api

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  memorySize: 256
  timeout: 30

functions:
  echo:
    handler: lambda-handler.handler
    events:
      - http:
          path: echo
          method: post
          cors: true
  health:
    handler: lambda-handler.health
    events:
      - http:
          path: health
          method: get
          cors: true
